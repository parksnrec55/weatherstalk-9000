<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff00cc"></stop>
      <stop offset="100%" stop-color="#00ffff"></stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#0a0014"></rect>

  <!-- Pixel-style W -->
  <path d="M20 25 L30 75 L45 45 L55 75 L70 25" stroke="url(#neonGradient)" stroke-width="10" stroke-linecap="square" fill="none" filter="url(#glow)"></path>
</svg>